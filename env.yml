name: euos25_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pandas
  - numpy
  - scikit-learn
  - rdkit
  - xgboost
  - lightgbm
  - catboost
  - matplotlib
  - seaborn
  - pytorch
  - torchvision
  - torchaudio
  - pyg  # For torch-geometric
  - cudatoolkit=11.7  # Optional: Only if you're using GPU
  - pip
  - pip:
      - torch-geometric
